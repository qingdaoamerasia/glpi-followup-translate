# PHP Session Configuration for GLPI
# 
# Add these settings to your PHP configuration to reduce session file
# accumulation. Edit the appropriate php.ini file for your setup:
#   - Apache: /etc/php/8.x/apache2/php.ini
#   - FPM:    /etc/php/8.x/fpm/php.ini
#   - CLI:    /etc/php/8.x/cli/php.ini
#
# After changes, restart PHP/Apache:
#   sudo systemctl restart apache2   # or php8.x-fpm

[Session]

; ── Garbage Collection ──────────────────────────────────────────────
; PHP's default gc_divisor=1000 means GC runs with 0.1% probability
; per session_start(). On a busy server, this almost never triggers.
; Set gc_divisor=100 for 1% probability, or use gc_probability=1
; with gc_divisor=10 for 10% probability.

session.gc_probability = 1
session.gc_divisor = 100
session.gc_maxlifetime = 1800    ; 30 minutes (match your cron cleanup)

; ── Session Save Handler ────────────────────────────────────────────
; Default is "files" which creates one file per session on disk.
; For better performance with many sessions, consider:
;
; Option A: Redis (best for high-volume, no disk I/O)
;   session.save_handler = redis
;   session.save_path = "tcp://127.0.0.1:6379"
;
; Option B: Memcached (good alternative to Redis)
;   session.save_handler = memcached
;   session.save_path = "127.0.0.1:11211"
;
; Option C: Keep files but use a tmpfs mount (RAM-backed, auto-cleared on reboot)
;   mount -t tmpfs -o size=100m tmpfs /var/lib/glpi/_sessions
;   Add to /etc/fstab:
;   tmpfs /var/lib/glpi/_sessions tmpfs defaults,size=100m 0 0

; ── Session Cookie Settings ─────────────────────────────────────────
; These don't affect API requests (GLPI uses Bearer token), but they
; help for web interface sessions.

session.cookie_httponly = 1
session.cookie_secure = 1        ; Enable if using HTTPS
session.use_strict_mode = 1
session.use_only_cookies = 1

; ── Session Lifetime ────────────────────────────────────────────────
; How long a session can be idle before it's considered stale.
; This affects both the cookie expiry and the gc_maxlifetime check.

session.cookie_lifetime = 0      ; Session cookie (browser close)
